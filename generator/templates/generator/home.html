<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador Profesional de Contraseñas</title>
<link rel="stylesheet" href="{% static 'generator/style.css' %}">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>Generador de Contraseñas</h1>
    <p>Protege tus cuentas con contraseñas fuertes y seguras en segundos</p>
  </header>

  <main>
    <div class="container">
      <!-- Configuración -->
      <div class="card">
        <h2>Configuración</h2>
        <div class="section">
          <label for="length">Longitud:</label>
          <input type="number" id="length" value="12" min="6" max="32">
        </div>
        <div class="section options">
          <label><input type="checkbox" id="uppercase" checked> Mayúsculas</label>
          <label><input type="checkbox" id="numbers" checked> Números</label>
          <label><input type="checkbox" id="symbols" checked> Símbolos</label>
        </div>
        <div class="section buttons">
            <button id="generate"><span> Generar Contraseña</span></button>
        </div>
      </div>

      <!-- Resultado -->
      <div class="card output-card">
        <h2>Contraseña Generada</h2>
        <div class="section output">
            <input type="text" id="password" readonly placeholder="Aquí aparecerá la contraseña">
            <button id="copy"><span>📋 Copiar</span></button>
        </div>
        <div class="section strength">
          <div id="strength-bar"></div>
          <p id="strength-text"></p>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>© 2026 Generador Profesional de Contraseñas | Seguro y moderno</p>
  </footer>

  <script>
  const generateBtn = document.getElementById('generate');
  const copyBtn = document.getElementById('copy');
  const passwordField = document.getElementById('password');
  const strengthBar = document.getElementById('strength-bar');
  const strengthText = document.getElementById('strength-text');

  function generatePassword() {
    const length = document.getElementById('length').value;
    let chars = "abcdefghijklmnopqrstuvwxyz";
    if(document.getElementById('uppercase').checked) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    if(document.getElementById('numbers').checked) chars += "0123456789";
    if(document.getElementById('symbols').checked) chars += "!@#$%^&*()_+";
    let password = "";
    for(let i=0;i<length;i++){
      password += chars.charAt(Math.floor(Math.random()*chars.length));
    }
    passwordField.value = password;

    passwordField.classList.add('glow');
    setTimeout(()=>{passwordField.classList.remove('glow');},800);

    // Fuerza
    let score=0;
    if(length>=8) score++;
    if(/[A-Z]/.test(password)) score++;
    if(/[0-9]/.test(password)) score++;
    if(/[^a-zA-Z0-9]/.test(password)) score++;
    const colors=["#ff4d4f","#ffa500","#ffff00","#4ade80"];
    const texts=["Débil","Media","Buena","Fuerte"];
    strengthBar.style.width=(score*25)+"%";
    strengthBar.style.background=colors[score-1]||"#ff4d4f";
    strengthText.textContent=texts[score-1]||"Débil";
  }

  generateBtn.addEventListener('click', generatePassword);
  copyBtn.addEventListener('click',()=>{
    passwordField.select();
    document.execCommand('copy');
    alert('Contraseña copiada!');
  });
  </script>
</body>
</html>
